<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高等统计力学考前完整推导站</title>
  <style>
    :root {
      --gold: #f4c95d;
      --gold-strong: #ffd56a;
      --gold-soft: rgba(244, 201, 93, .16);
      --text: rgba(255,255,255,.94);
      --muted: rgba(255,255,255,.64);
      --faint: rgba(255,255,255,.38);
      --glass: rgba(10,10,10,.58);
      --line: rgba(244,201,93,.30);
      --line-soft: rgba(255,255,255,.14);
      --serif: "Noto Serif SC", "Songti SC", "SimSun", serif;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--text);
      background: #000;
      font-family: var(--sans);
      letter-spacing: 0;
    }
    button { font: inherit; color: inherit; border: 0; background: none; cursor: pointer; }
    .site {
      min-height: 100vh;
      background:
        radial-gradient(circle at 78% 12%, rgba(244,201,93,.09), transparent 18rem),
        url("./assets/starfield.png") center top / cover fixed no-repeat,
        #000;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      padding: 16px clamp(14px, 2.4vw, 34px) 28px;
      border-bottom: 1px solid rgba(244,201,93,.22);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.08), rgba(0,0,0,.42) 54%, rgba(0,0,0,.92)),
        linear-gradient(180deg, rgba(0,0,0,.42), rgba(0,0,0,.12) 35%, rgba(0,0,0,.88));
      z-index: 1;
      pointer-events: none;
    }
    .hero-image {
      position: absolute;
      inset: 0;
      background: url("./assets/cosmic-statmech.png") left center / cover no-repeat;
      filter: saturate(1.05) contrast(1.05);
      transform: scale(1.02);
    }
    .orbit-lines {
      position: absolute;
      inset: 72px 210px 0 18%;
      border: 1px solid rgba(244,201,93,.18);
      border-left: 0;
      border-bottom: 0;
      border-radius: 100% 0 0 0;
      transform: rotate(8deg);
      z-index: 2;
      pointer-events: none;
      box-shadow: 0 0 80px rgba(244,201,93,.08);
    }
    .orbit-lines::before,
    .orbit-lines::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(255,255,255,.12);
      border-left: 0;
      border-bottom: 0;
      border-radius: 100% 0 0 0;
    }
    .orbit-lines::before { inset: 58px 60px 0 8%; }
    .orbit-lines::after { inset: 118px 145px 0 18%; }

    .top-nav {
      position: relative;
      z-index: 5;
      display: grid;
      gap: 18px;
    }
    .major-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid rgba(244,201,93,.30);
      background: linear-gradient(180deg, rgba(0,0,0,.70), rgba(0,0,0,.30));
      backdrop-filter: blur(14px);
    }
    .major-tab {
      min-height: 62px;
      border-right: 1px solid rgba(255,255,255,.18);
      font-family: var(--serif);
      font-size: clamp(22px, 3vw, 40px);
      color: rgba(255,255,255,.54);
      text-shadow: 0 2px 8px #000;
      position: relative;
    }
    .major-tab:last-child { border-right: 0; }
    .major-tab.active {
      color: var(--gold-strong);
    }
    .major-tab.active::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: -1px;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 28px rgba(244,201,93,.75);
    }
    .minor-tabs {
      display: flex;
      gap: clamp(18px, 4vw, 64px);
      overflow-x: auto;
      padding: 0 4px 10px;
      scrollbar-width: thin;
    }
    .major-tabs::-webkit-scrollbar,
    .minor-tabs::-webkit-scrollbar,
    .timeline::-webkit-scrollbar,
    .toc-list::-webkit-scrollbar { display: none; }
    .major-tabs,
    .minor-tabs,
    .timeline,
    .toc-list { scrollbar-width: none; }


    /* 横向滚动优化：专题标签太多时显示可拖动滚动条，手机可滑，电脑滚轮可横向滚。 */
    .major-tabs,
    .minor-tabs,
    .timeline,
    .toc-list {
      scrollbar-width: thin;
      scrollbar-color: rgba(244,201,93,.75) rgba(255,255,255,.10);
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }
    .minor-tabs {
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      padding: 0 8px 15px;
      margin-inline: -2px;
      scroll-snap-type: x proximity;
      mask-image: linear-gradient(90deg, transparent 0, #000 18px, #000 calc(100% - 18px), transparent 100%);
    }
    .minor-tab {
      scroll-snap-align: start;
    }
    .minor-tabs::-webkit-scrollbar,
    .major-tabs::-webkit-scrollbar,
    .timeline::-webkit-scrollbar,
    .toc-list::-webkit-scrollbar {
      height: 9px;
      display: block;
    }
    .minor-tabs::-webkit-scrollbar-track,
    .major-tabs::-webkit-scrollbar-track,
    .timeline::-webkit-scrollbar-track,
    .toc-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,.10);
      border-radius: 999px;
    }
    .minor-tabs::-webkit-scrollbar-thumb,
    .major-tabs::-webkit-scrollbar-thumb,
    .timeline::-webkit-scrollbar-thumb,
    .toc-list::-webkit-scrollbar-thumb {
      background: linear-gradient(90deg, rgba(244,201,93,.55), rgba(255,213,106,.92));
      border-radius: 999px;
      box-shadow: 0 0 16px rgba(244,201,93,.38);
    }
    .minor-tabs::-webkit-scrollbar-thumb:hover,
    .major-tabs::-webkit-scrollbar-thumb:hover,
    .timeline::-webkit-scrollbar-thumb:hover,
    .toc-list::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(90deg, rgba(244,201,93,.75), rgba(255,236,181,.98));
    }
    .minor-tab {
      flex: 0 0 auto;
      min-width: 88px;
      color: rgba(255,255,255,.62);
      text-align: center;
      font-family: var(--serif);
      font-weight: 700;
      font-size: clamp(15px, 1.8vw, 23px);
      text-shadow: 0 2px 8px #000;
      position: relative;
      padding: 10px 4px;
    }
    .minor-tab.active { color: var(--gold-strong); }
    .minor-tab.active::after {
      content: "";
      position: absolute;
      left: 24%;
      right: 24%;
      bottom: 0;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 20px rgba(244,201,93,.8);
    }

    .hero-content {
      position: relative;
      z-index: 4;
      min-height: calc(100vh - 164px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 26px;
      align-items: end;
      padding-top: 28px;
    }
    .hero-title {
      max-width: 840px;
      padding-bottom: 42px;
      text-shadow: 0 4px 18px #000;
    }
    .eyebrow {
      color: var(--gold);
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: 12px;
      margin: 0 0 12px;
    }
    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(42px, 7vw, 88px);
      line-height: .98;
      letter-spacing: 0;
    }
    .hero-title p {
      margin: 18px 0 0;
      max-width: 680px;
      color: rgba(255,255,255,.76);
      line-height: 1.9;
      font-size: 17px;
    }

    .right-rail {
      align-self: stretch;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 20px;
      min-height: 610px;
      padding-top: 20px;
    }
    .timeline {
      justify-self: end;
      width: 190px;
      padding-top: 8px;
    }
    .time-node {
      width: 100%;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 56px;
      color: rgba(255,255,255,.55);
      text-align: left;
      position: relative;
      font-family: var(--serif);
      font-weight: 700;
    }
    .time-node::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255,255,255,.32);
    }
    .dot {
      position: relative;
      z-index: 2;
      width: 16px;
      height: 16px;
      margin-left: 8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.50);
      background: #050505;
    }
    .time-node.active { color: var(--gold-strong); transform: scale(1.08); transform-origin: left center; }
    .time-node.active .dot {
      width: 34px;
      height: 34px;
      margin-left: 0;
      border-color: var(--gold);
      background: radial-gradient(circle, rgba(255,255,255,.92) 0 24%, rgba(244,201,93,.72) 26% 48%, rgba(244,201,93,.18) 50%);
      box-shadow: 0 0 32px rgba(244,201,93,.9);
    }
    .time-node b { font-size: 20px; margin-right: 8px; }

    .info-card {
      width: min(100%, 520px);
      border: 1px solid rgba(255,255,255,.26);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(36,34,24,.70), rgba(7,7,7,.70));
      backdrop-filter: blur(18px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 18px 70px rgba(0,0,0,.48);
      padding: 22px 24px 20px;
    }
    .info-card h2 {
      margin: 0 0 12px;
      font-family: var(--serif);
      color: rgba(255,236,181,.92);
      font-size: 34px;
      line-height: 1.1;
    }
    .facts {
      display: grid;
      gap: 8px;
      margin: 14px 0;
      color: rgba(255,255,255,.72);
    }
    .fact {
      display: grid;
      grid-template-columns: 92px minmax(0,1fr);
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      padding-bottom: 7px;
    }
    .fact span:first-child { color: rgba(255,255,255,.50); }
    .fact span:last-child { text-align: right; font-weight: 700; }
    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .mode-tab {
      min-height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.64);
    }
    .mode-tab.active {
      color: #1a1200;
      background: linear-gradient(135deg, var(--gold), #fff0a8);
      box-shadow: 0 0 24px rgba(244,201,93,.28);
    }
    .next-button {
      width: 100%;
      min-height: 58px;
      margin-top: 14px;
      border-radius: 10px;
      border: 1px solid rgba(244,201,93,.34);
      background: linear-gradient(135deg, rgba(244,201,93,.26), rgba(244,201,93,.08));
      color: rgba(255,235,180,.90);
      font-family: var(--serif);
      font-size: 21px;
    }

    .study-body {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 70px;
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 20px;
    }
    .section-title h2 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 52px);
    }
    .section-title p { margin: 0; color: var(--muted); max-width: 680px; line-height: 1.75; }
    .detail-layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .toc-panel,
    .derivation-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(8,8,8,.72);
      backdrop-filter: blur(18px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .toc-panel {
      position: sticky;
      top: 16px;
      padding: 14px;
    }
    .toc-title {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 4px 6px 12px;
    }
    .toc-button {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      padding: 11px 8px;
      border-radius: 8px;
      color: var(--muted);
    }
    .toc-button.active {
      background: rgba(244,201,93,.12);
      outline: 1px solid rgba(244,201,93,.34);
      color: var(--text);
    }
    .toc-button b { color: var(--gold); }
    .toc-button strong { display: block; }
    .toc-button span { display: block; color: var(--faint); margin-top: 3px; font-size: 12px; }
    .derivation-panel { padding: clamp(18px, 3vw, 34px); min-width: 0; }
    .step-card {
      display: block;
      padding: 18px 18px 20px;
      margin: 0 0 16px;
      border: 1px solid rgba(244,201,93,.16);
      border-radius: 14px;
      background: rgba(255,255,255,.035);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 18px 50px rgba(0,0,0,.22);
      scroll-margin-top: 20px;
    }
    .step-card.active {
      border-color: rgba(244,201,93,.44);
      background: linear-gradient(180deg, rgba(244,201,93,.09), rgba(255,255,255,.035));
    }
    .step-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .step-badge {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      color: #160f00;
      background: linear-gradient(135deg, var(--gold), #fff0a8);
      font-weight: 900;
      font-size: 14px;
      box-shadow: 0 0 22px rgba(244,201,93,.35);
    }
    .step-card h3 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(17px, 2vw, 23px);
      font-weight: 800;
      line-height: 1.45;
    }
    .formula-list,
    .explain-list,
    .exam-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .formula {
      display: block;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 12px;
      padding: 0;
      background: rgba(255,255,255,.065);
      color: rgba(255,246,222,.92);
      font-family: "Cambria Math", "Times New Roman", "Noto Serif SC", serif;
      font-size: 19px;
      line-height: 1.8;
      overflow: hidden;
      overflow-wrap: anywhere;
    }
    .formula sub,
    .formula sup { line-height: 0; }
    .formula .eq {
      position: relative;
      display: block;
      min-height: 74px;
      padding: 18px 22px 16px 52px;
      border-top: 1px solid rgba(255,255,255,.18);
      border-bottom: 1px solid rgba(255,255,255,.18);
      color: rgba(255,246,222,.98);
      text-align: center;
      font-size: clamp(20px, 2.2vw, 28px);
      line-height: 1.55;
    }
    .formula .eq .MathJax {
      margin: 0 auto !important;
      font-size: 112% !important;
    }
    .formula .why {
      display: block;
      padding: 12px 17px 14px;
      color: rgba(212,210,202,.78);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.75;
      text-align: left;
    }
    .formula .mini {
      position: absolute;
      left: 16px;
      top: 18px;
      color: var(--gold);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 800;
      margin-right: 0;
    }
    .formula .math-tex {
      display: block;
      width: 100%;
    }
    .formula mjx-container[jax="CHTML"][display="true"] {
      margin: 0 !important;
    }
    .explain-grid {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(0, .95fr);
      gap: 12px;
      margin-top: 14px;
    }
    .note-box {
      border: 1px solid rgba(244,201,93,.22);
      border-radius: 10px;
      padding: 14px 15px;
      background: rgba(244,201,93,.055);
    }
    .note-box h4 {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 14px;
    }
    .note-box.exam {
      border-color: rgba(255,255,255,.14);
      background: rgba(255,255,255,.045);
    }
    .note-box p,
    .note-box li {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
    }
    .note-box li + li { margin-top: 6px; }
    .note-box ul { margin: 0; padding-left: 18px; }
    .source-strip {
      margin-top: 18px;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .hero { min-height: auto; }
      .major-tabs { grid-template-columns: repeat(3, max-content); overflow-x: auto; }
      .major-tab { min-width: 160px; padding: 0 14px; }
      .hero-content { grid-template-columns: 1fr; min-height: auto; padding-top: 24px; }
      .hero-title { padding: 54vh 0 8px; }
      .right-rail { min-height: auto; grid-template-rows: auto auto; }
      .timeline {
        justify-self: stretch;
        width: 100%;
        display: flex;
        overflow-x: auto;
        gap: 12px;
        padding-bottom: 8px;
      }
      .time-node { min-width: 170px; }
      .time-node::before { display: none; }
      .info-card { width: 100%; }
      .detail-layout { grid-template-columns: 1fr; }
      .toc-panel { position: static; }
      .toc-list { display: flex; overflow-x: auto; gap: 10px; }
      .toc-button { min-width: 230px; }
      .explain-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .hero { padding-inline: 10px; }
      .major-tab { min-height: 52px; font-size: 22px; }
      .minor-tabs { gap: 18px; }
      h1 { font-size: 39px; }
      .hero-title { padding-top: 48vh; }
      .info-card { padding: 18px; border-radius: 14px; }
      .info-card h2 { font-size: 28px; }
      .fact { grid-template-columns: 82px 1fr; }
      .mode-tabs { grid-template-columns: 1fr; }
      .study-body { width: min(calc(100% - 20px), 760px); }
      .section-title { display: block; }
      .section-title p { margin-top: 10px; }
      .formula { font-size: 17px; }
      .formula .eq {
        min-height: 60px;
        padding: 14px 12px 12px 42px;
        font-size: 20px;
      }
      .formula .mini {
        left: 12px;
        top: 14px;
      }
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]],
        processEscapes: true
      },
      chtml: {
        scale: 1,
        displayAlign: "center"
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./expanded-content.js"></script>
  <script src="./deep-overrides.js"></script>
  <script src="./lecture-1-127-overrides.js"></script>
  <script src="./source-derivations-overrides.js"></script>
  <script src="./complete-derivation-overrides.js"></script>
  <script>
    const { useEffect, useMemo, useState } = React;

    const DATA = window.EXPANDED_DATA || [
      {
        id: "ensemble",
        name: "系综理论",
        topics: [
          topic("entropy", "最大熵原理", "考试要求 1-2", "从统计熵严格推出 Boltzmann 因子", "S = -k<sub>B</sub>Σp<sub>i</sub>ln p<sub>i</sub>", [
            step("确定问题：在已知宏观约束下求最无偏分布", [
              "设系统可能处在微观态 i，概率为 p<sub>i</sub>，所有概率必须满足 Σ<sub>i</sub>p<sub>i</sub>=1。",
              "若系统只与热库交换能量而粒子数和体积固定，则还知道平均能量 U=Σ<sub>i</sub>p<sub>i</sub>E<sub>i</sub>。",
              "Gibbs 熵写成 S=-k<sub>B</sub>Σ<sub>i</sub>p<sub>i</sub>ln p<sub>i</sub>。"
            ], [
              "这里的目标不是猜某个 p<sub>i</sub>，而是在所有满足约束的概率分布中找熵最大的那个。",
              "归一化约束保证它真的是概率分布；平均能量约束保证它代表同一个宏观平衡态。",
              "如果考试只写最终 p<sub>i</sub>∝e<sup>-βE<sub>i</sub></sup>，中间变分逻辑就缺了。"
            ], "先写约束，再写熵。不要把 Boltzmann 因子当作先验结论。"),
            step("构造带约束的变分泛函", [

              "平衡时 n<sub>n</sub>/n<sub>p</sub>=e<sup>-(m<sub>n</sub>-m<sub>p</sub>)/T</sup>。",
              "Δm=m<sub>n</sub>-m<sub>p</sub>≈1.29 MeV。",
              "当弱反应 Γ<sub>w</sub>≈H 后，n/p 比冻结。"
            ], [
              "中子较重，因此温度下降时平衡中子比例降低。",
              "冻结以后比例不再能快速跟随平衡值。",
              "从冻结到核合成开始之间，自由中子还会衰变。"
            ], "n/p 的 Boltzmann 因子是 BBN 丰度估算第一步。"),
            step("氘瓶颈和 He-4 丰度", [
              "核合成要先形成氘：p+n↔D+γ。",
              "由于光子数远多于重子数，高能光子会光解氘，导致氘瓶颈。",
              "温度进一步下降后，剩余中子几乎都进入 He-4。",
              "设 r=n<sub>n</sub>/n<sub>p</sub>，每个 He-4 消耗两个中子，所以 n<sub>He</sub>=n<sub>n</sub>/2。",
              "质量丰度 Y<sub>p</sub>=4n<sub>He</sub>/(n<sub>p</sub>+n<sub>n</sub>)=2r/(1+r)。"
            ], [
              "若 r≈1/7，则 Y<sub>p</sub>≈1/4。",
              "这就是原初氦丰度约 25% 的经典估算。",
              "这个推导把 Boltzmann 因子、反应冻结、衰变和核反应网络串起来。"
            ], "最后的 Y<sub>p</sub>=2r/(1+r) 要会自己推出来。")
          ])
        ]
      }
    ];

    function topic(id, label, exam, summary, core, steps) {
      return { id, label, exam, summary, core, steps };
    }
    function step(title, formulas, notes, exam) {
      return { title, formulas, notes, exam };
    }

    function cleanLabel(label) {
      return String(label || "")
        .replace(/^\s*讲义\+真题[：:]\s*/, "")
        .replace(/^\s*讲义＋真题[：:]\s*/, "");
    }
    function horizontalWheel(e) {
      const el = e.currentTarget;
      if (!el || el.scrollWidth <= el.clientWidth) return;
      const dx = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      if (!dx) return;
      el.scrollLeft += dx;
      e.preventDefault();
    }

    function App() {
      const initial = initialSelection();
      const [catId, setCatId] = useState(initial.catId);
      const [topicId, setTopicId] = useState(initial.topicId);
      const [stepIndex, setStepIndex] = useState(0);
      const [mode, setMode] = useState("derive");
      const cat = useMemo(() => DATA.find(c => c.id === catId) || DATA[0], [catId]);
      const topic = useMemo(() => cat.topics.find(t => t.id === topicId) || cat.topics[0], [cat, topicId]);
      const activeStep = topic.steps[stepIndex] || topic.steps[0];

      useEffect(() => {
        const timer = window.setTimeout(() => {
          if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise([document.getElementById("root")]).catch(() => {});
          }
        }, 0);
        return () => window.clearTimeout(timer);
      }, [catId, topicId, stepIndex, mode]);

      function selectCat(id) {
        const next = DATA.find(c => c.id === id);
        setCatId(id);
        setTopicId(next.topics[0].id);
        setStepIndex(0);
      }
      function selectTopic(id) {
        setTopicId(id);
        setStepIndex(0);
      }
      function selectStep(i) {
        setStepIndex(i);
        const el = document.getElementById("step-" + i);
        if (el) setTimeout(() => el.scrollIntoView({ behavior: "smooth", block: "start" }), 0);
      }
      function nextTopic() {
        const idx = cat.topics.findIndex(t => t.id === topic.id);
        const next = cat.topics[(idx + 1) % cat.topics.length];
        selectTopic(next.id);
      }
      const activeTitle = displayTitle(activeStep.title);

      return React.createElement("div", { className: "site" },
        React.createElement("section", { className: "hero" },
          React.createElement("div", { className: "hero-image" }),
          React.createElement("div", { className: "orbit-lines" }),
          React.createElement("header", { className: "top-nav" },
            React.createElement("nav", { className: "major-tabs", onWheel: horizontalWheel },
              DATA.map(c => React.createElement("button", {
                key: c.id,
                className: "major-tab" + (c.id === cat.id ? " active" : ""),
                onClick: () => selectCat(c.id)
              }, c.name))
            ),
            React.createElement("nav", { className: "minor-tabs", onWheel: horizontalWheel },
              cat.topics.map(t => React.createElement("button", {
                key: t.id,
                className: "minor-tab" + (t.id === topic.id ? " active" : ""),
                onClick: () => selectTopic(t.id)
              }, cleanLabel(t.label)))
            )
          ),
          React.createElement("div", { className: "hero-content" },
            React.createElement("div", { className: "hero-title" },
              React.createElement("p", { className: "eyebrow" }, "Complete Derivation Review"),
              React.createElement("h1", null, "高统完整推导站"),
              React.createElement("p", null, "按考试要求重做：公式使用正常数学上下标排版；每个知识点从物理假设、约束、变分或求和开始，逐步推到考试可写结论。当前主题：" + cleanLabel(topic.label) + "。")
            ),
            React.createElement("aside", { className: "right-rail" },
              React.createElement("div", { className: "timeline", onWheel: horizontalWheel },
                topic.steps.map((s, i) => React.createElement("button", {
                  key: s.title,
                  className: "time-node" + (i === stepIndex ? " active" : ""),
                  onClick: () => selectStep(i)
                },
                  React.createElement("span", { className: "dot" }),
                  React.createElement("span", null, React.createElement("b", null, stepNo(i)), displayTitle(s.title))
                ))
              ),
              React.createElement("div", { className: "info-card" },
                React.createElement("h2", null, stepNo(stepIndex) + " " + activeTitle),
                React.createElement("div", { className: "facts" },
                  fact("主题", cleanLabel(topic.label)),
                  fact("范围", topic.exam),
                  fact("主公式", React.createElement("span", { dangerouslySetInnerHTML: { __html: topic.core } })),
                  fact("当前", activeStep.exam)
                ),
                React.createElement("div", { className: "mode-tabs" },
                  modeButton("derive", "完整推导", mode, setMode),
                  modeButton("exam", "考试写法", mode, setMode),
                  modeButton("notes", "易错解释", mode, setMode)
                ),
                React.createElement("button", { className: "next-button", onClick: nextTopic }, "下一站：" + nextTopicLabel(cat, topic))
              )
            )
          )
        ),
        React.createElement("main", { className: "study-body" },
          React.createElement("div", { className: "section-title" },
            React.createElement("h2", null, cleanLabel(topic.label) + "：完整推导正文"),
            React.createElement("p", null, topic.summary + "。下面每一步都保留公式和解释，不用代码块式下划线变量。")
          ),
          React.createElement("div", { className: "detail-layout" },
            React.createElement("aside", { className: "toc-panel" },
              React.createElement("div", { className: "toc-title" }, "目录"),
              React.createElement("div", { className: "toc-list", onWheel: horizontalWheel },
                topic.steps.map((s, i) => React.createElement("button", {
                  key: s.title,
                  className: "toc-button" + (i === stepIndex ? " active" : ""),
                  onClick: () => selectStep(i)
                },
                  React.createElement("b", null, stepNo(i)),
                  React.createElement("span", null, React.createElement("strong", null, displayTitle(s.title)), React.createElement("span", null, s.exam))
                ))
              ),
              React.createElement("div", { className: "source-strip" }, "内容整合自：考试要求、课程笔记 PDF、系综理论与真题 PDF、旧学习站 index，以及 20260615/17/22/24 视频关键帧。")
            ),
            React.createElement("article", { className: "derivation-panel" },
              topic.steps.map((s, i) => React.createElement("section", {
                  className: "step-card" + (i === stepIndex ? " active" : ""),
                  id: "step-" + i,
                  key: s.title,
                  onMouseEnter: () => setStepIndex(i)
                },
                React.createElement("div", { className: "step-heading" },
                  React.createElement("span", { className: "step-badge" }, stepNo(i)),
                  React.createElement("h3", null, displayTitle(s.title))
                ),
                React.createElement("ul", { className: "formula-list" },
                  s.formulas.map((f, idx) => React.createElement("li", { key: idx, className: "formula", dangerouslySetInnerHTML: { __html: f } }))
                ),
                React.createElement("div", { className: "explain-grid" },
                  React.createElement("div", { className: "note-box" },
                    React.createElement("h4", null, "逐步解释"),
                    React.createElement("ul", null, s.notes.map((n, idx) => React.createElement("li", { key: idx, dangerouslySetInnerHTML: { __html: n } })))
                  ),
                  React.createElement("div", { className: "note-box exam" },
                    React.createElement("h4", null, "考试写法 / 易错点"),
                    React.createElement("p", { dangerouslySetInnerHTML: { __html: s.exam } })
                  )
                )
              ))
            )
          )
        )
      );
    }

    function fact(label, value) {
      return React.createElement("div", { className: "fact" },
        React.createElement("span", null, label),
        typeof value === "string" ? React.createElement("span", null, value) : value
      );
    }
    function modeButton(id, label, mode, setMode) {
      return React.createElement("button", {
        className: "mode-tab" + (mode === id ? " active" : ""),
        onClick: () => setMode(id)
      }, label);
    }
    function stepNo(i) {
      return String(i + 1).padStart(2, "0");
    }
    function displayTitle(title) {
      return String(title).replace(/^\s*\d{1,2}\s+/, "");
    }
    function initialSelection() {
      const raw = decodeURIComponent((window.location.hash || "").replace(/^#/, ""));
      for (const section of DATA) {
        if (section.id === raw) return { catId: section.id, topicId: section.topics[0].id };
        const topic = section.topics.find((item) => item.id === raw);
        if (topic) return { catId: section.id, topicId: topic.id };
      }
      return { catId: DATA[0].id, topicId: DATA[0].topics[0].id };
    }
    function nextTopicLabel(cat, topic) {
      const idx = cat.topics.findIndex(t => t.id === topic.id);
      return cleanLabel(cat.topics[(idx + 1) % cat.topics.length].label);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
